x-dev-app: &dev-app
  image: blog-monorepo:dev
  build:
    context: .
    dockerfile: docker/Dockerfile
    target: dev
  env_file:
    - .env
  volumes:
    - .:/app
    - dev_node_modules:/app/node_modules
    - dev_pnpm_store:/pnpm/store

services:
  db:
    image: postgres:16-alpine
    container_name: blog_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-blog}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-blog_secret}
      POSTGRES_DB: ${POSTGRES_DB:-blog}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-blog} -d ${POSTGRES_DB:-blog}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  cms:
    <<: *dev-app
    container_name: blog_cms
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_CLIENT: postgres
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB:-blog}
      DATABASE_USERNAME: ${POSTGRES_USER:-blog}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-blog_secret}
      DATABASE_SSL: "false"
      HOST: 0.0.0.0
      PORT: 1337
      NODE_ENV: development
    ports:
      - "${CMS_PORT:-1337}:1337"
    volumes:
      - .:/app
      - dev_node_modules:/app/node_modules
      - dev_pnpm_store:/pnpm/store
      - cms_uploads:/app/apps/cms/public/uploads
    command: ["pnpm", "--filter", "cms", "develop"]

  web:
    <<: *dev-app
    container_name: blog_web
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_SSL: "false"
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${WEB_PORT:-3000}:3000"
    command:
      ["pnpm", "--filter", "web", "dev", "--hostname", "0.0.0.0", "--port", "3000"]

volumes:
  postgres_data:
  dev_node_modules:
  dev_pnpm_store:
  cms_uploads:
